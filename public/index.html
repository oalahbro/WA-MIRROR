<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WA Mirror</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-title" content="WA Mirror" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#008069" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Layar login -->
  <div id="login" class="login">
    <div class="login-box">
      <h1>WA Mirror</h1>
      <p>Masukkan token akses</p>
      <input id="tokenInput" type="password" placeholder="AUTH_TOKEN" autocomplete="off" />
      <button id="loginBtn"><span class="btn-label">Masuk</span><span class="btn-spin hidden"></span></button>
      <div id="loginErr" class="login-err"></div>
    </div>
  </div>

  <!-- Overlay QR (kalau WA belum terhubung) -->
  <div id="qrOverlay" class="qr-overlay hidden">
    <div class="qr-box">
      <h2>Hubungkan WhatsApp</h2>
      <p>Buka WhatsApp di HP → Perangkat tertaut → Tautkan perangkat → scan:</p>
      <div class="qr-frame">
        <img id="qrImg" class="hidden" alt="QR" />
        <div id="qrWait" class="qr-wait"><span class="spinner"></span><span>Menunggu QR…</span></div>
      </div>
    </div>
  </div>

  <!-- App utama -->
  <div id="app" class="app hidden">
    <aside class="sidebar">
      <header class="sidebar-head">
        <div class="head-row">
          <div class="me" id="meLabel">WA Mirror</div>
          <div id="statusPill" class="status-pill connecting">
            <span class="dot"></span><span id="statusText">Menghubungkan…</span>
          </div>
          <button id="themeBtn" class="icon-btn" title="Tema warna">🎨</button>
        </div>
        <div id="themePopover" class="theme-popover hidden">
          <div class="theme-title">Tema</div>
          <div class="theme-opts">
            <button class="theme-opt" data-theme="light"><span class="theme-prev" data-t="light"></span>Terang</button>
            <button class="theme-opt" data-theme="dark"><span class="theme-prev" data-t="dark"></span>Gelap</button>
            <button class="theme-opt" data-theme="senja"><span class="theme-prev" data-t="senja"></span>Senja</button>
            <button class="theme-opt" data-theme="bbm"><span class="theme-prev" data-t="bbm"></span>BBM</button>
          </div>
          <div class="theme-title accent-title">Warna aksen</div>
          <div class="accent-swatches">
            <button class="swatch accent-default" data-accent="" title="Bawaan tema">A</button>
            <button class="swatch" data-accent="green"  style="background:#00a884" title="Hijau"></button>
            <button class="swatch" data-accent="blue"   style="background:#2f80ed" title="Biru"></button>
            <button class="swatch" data-accent="purple" style="background:#7b5cff" title="Ungu"></button>
            <button class="swatch" data-accent="orange" style="background:#f0900c" title="Jingga"></button>
            <button class="swatch" data-accent="rose"   style="background:#e0526a" title="Rose"></button>
            <button class="swatch" data-accent="teal"   style="background:#0d9488" title="Teal"></button>
          </div>
        </div>
        <div id="statsLine" class="stats-line hidden">
          <span id="statChats">0</span> chat · <span id="statMsgs">0</span> pesan
        </div>
        <input id="search" class="search" placeholder="Cari chat… (Enter: cari isi pesan)" />
        <div id="chatFilters" class="chat-filters">
          <button class="filter-tab active" data-filter="all">Semua<span class="filter-count hidden"></span></button>
          <button class="filter-tab" data-filter="private">Pribadi<span class="filter-count hidden"></span></button>
          <button class="filter-tab" data-filter="group">Grup<span class="filter-count hidden"></span></button>
        </div>
      </header>

      <!-- Banner sinkronisasi -->
      <div id="syncBanner" class="sync-banner hidden">
        <span class="spinner sm"></span>
        <span id="syncText">Menyinkronkan riwayat…</span>
      </div>

      <div id="chatList" class="chat-list"></div>
    </aside>

    <main class="conversation">
      <div id="convEmpty" class="conv-empty">
        <div class="empty-art">💬</div>
        <div>Pilih chat untuk mulai</div>
      </div>
      <div id="convView" class="conv-view hidden">
        <header class="conv-head">
          <button id="backBtn" class="back-btn" title="Kembali">←</button>
          <span id="convAvatar" class="avatar"><span class="avatar-initials"></span><img class="avatar-img" alt=""></span>
          <div id="convTitle" class="conv-title"></div>
        </header>
        <div class="messages-wrap">
          <div id="messages" class="messages"></div>
          <div id="convLoading" class="conv-loading hidden"><span class="spinner"></span></div>
          <button id="jumpBtn" class="jump-btn hidden" title="Ke pesan terbaru">↓<span id="jumpDot" class="jump-dot hidden"></span></button>
        </div>
        <div class="compose">
          <div id="replyBar" class="reply-bar hidden">
            <div class="reply-bar-info">
              <span id="replySender" class="reply-bar-sender"></span>
              <span id="replyText" class="reply-bar-text"></span>
            </div>
            <button type="button" id="replyCancel" class="reply-cancel" title="Batalkan">✕</button>
          </div>
          <div id="attachPreview" class="attach-preview hidden">
            <div id="attachThumb" class="attach-thumb"></div>
            <div class="attach-info">
              <span id="attachName" class="attach-name"></span>
              <span id="attachMeta" class="attach-meta"></span>
            </div>
            <button type="button" id="attachCancel" class="attach-cancel" title="Batalkan">✕</button>
          </div>
          <div id="emojiPanel" class="emoji-panel hidden">
            <div id="emojiTabs" class="emoji-tabs"></div>
            <div id="emojiGrid" class="emoji-grid"></div>
          </div>
          <form id="sendForm" class="send-bar">
            <button type="button" id="emojiBtn" class="emoji-btn" title="Emoji">😀</button>
            <button type="button" id="attachBtn" class="attach-btn" title="Lampirkan foto / video / dokumen">📎</button>
            <input id="fileInput" type="file" accept="image/*,video/*,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.csv,.rtf,.odt,.ods,.odp,.zip,.rar,.7z,.tar,.gz,.tgz,.bz2" class="hidden" />
            <div id="sendInput" class="send-input" contenteditable="true" role="textbox" aria-multiline="true" data-ph="Ketik pesan…"></div>
            <button id="sendBtn" type="submit" class="send-btn">
              <span class="btn-label">Kirim</span><span class="btn-spin hidden"></span>
            </button>
          </form>
        </div>
      </div>
    </main>
  </div>

  <!-- Lightbox media (foto/video resolusi penuh) -->
  <div id="lightbox" class="lightbox hidden">
    <button id="lightboxClose" class="lb-close" title="Tutup">✕</button>
    <div id="lightboxContent" class="lb-content"></div>
  </div>

  <!-- Menu konteks pesan (klik-kanan / long-press) -->
  <div id="msgMenu" class="msg-menu hidden"></div>

  <!-- Toast container -->
  <div id="toasts" class="toasts"></div>

  <script src="app.js"></script>
</body>
</html>
